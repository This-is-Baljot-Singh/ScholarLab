# Prometheus configuration for ScholarLab
# Collects metrics from FastAPI /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'scholarlab-monitor'

# Scrape configurations
scrape_configs:
  # ScholarLab API metrics
  - job_name: 'scholarlab-api'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional)
rule_files:
  # - "rules.yml"
